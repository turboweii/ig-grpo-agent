# IG-Full 实验配置
# 完整 IG-GRPO 方案：JIG + 课程学习 + 探索持续性

defaults:
  - base: base

trainer:
  project: IG-GRPO
  experiment_name: ig_full_retail

  # IG-GRPO 完整配置
  use_jig_reward: true
  jig_weight: 0.5
  jig_use_curriculum: true  # 启用课程学习

  # 所有组件
  use_coverage_tracker: true
  use_sustained_exploration: true  # 启用探索持续性
  use_dependency_graph: true

  # 课程学习参数
  jig_alpha_0: 0.8
  jig_beta: 0.7
  total_steps: 300

  # 权重分解
  alpha_state: 0.3
  alpha_tool: 0.4
  alpha_transfer: 0.2
  alpha_sustained: 0.1

  # G-Normalization
  g_norm_gamma: 0.5

  # 探索持续性
  sustained_window: 50
  sustained_trend_threshold: -0.01

  # 重复惩罚
  repeat_penalty: 0.3
  repeat_window: 3

  # Bypass 模式
  bypass_mode: true
  fused_cross_entropy: true

ig_grpo:
  use_jig_reward: true
  jig_weight: 0.5
  jig_use_curriculum: true
  jig_alpha_0: 0.8
  jig_beta: 0.7

  alpha_state: 0.3
  alpha_tool: 0.4
  alpha_transfer: 0.2
  alpha_sustained: 0.1

  g_norm_gamma: 0.5

  use_coverage_tracker: true
  use_sustained_exploration: true
  sustained_window: 50
  sustained_trend_threshold: -0.01

  repeat_penalty: 0.3
  repeat_window: 3

  use_dependency_graph: true

  bypass_mode: true
  fused_cross_entropy: true

logging:
  log_interval: 10
  save_interval: 50
  eval_interval: 50

output:
  output_dir: outputs/ig_full/
