# IG-GRPO: LoRA SFT 训练配置 (Retail 域)
# 适配 4×4090 (24GB) 多卡训练
# SFT 作为 GRPO 训练前的预热步骤

model:
  name_or_path: "Qwen/Qwen2.5-7B-Instruct"  # 基础模型
  attn_impl: "flash_attention_2"  # 使用 flash_attention_2 加速

data:
  train_jsonl: "experiments/sft_retail/train.jsonl"
  eval_jsonl: null  # 数据少先不切 eval
  max_length: 8192   # 序列长度

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

train:
  num_epochs: 3
  per_device_batch_size: 4   # 4×4090 可以用 4，等效 batch=64
  gradient_accumulation_steps: 4
  lr: 1.0e-4
  lr_scheduler: cosine
  warmup_ratio: 0.05
  weight_decay: 0.0
  max_grad_norm: 1.0
  logging_steps: 5
  save_strategy: epoch
  save_total_limit: 3
  run_name: "sft_retail_lora"
  seed: 42

  # 多卡配置
  num_gpus: 4
  gradient_checkpointing: true
  bf16: true
  optim: adamw_torch_fused  # 使用融合优化器加速
  ddp_find_unused_parameters: false
  # Flash Attention 2
  attn_implementation: flash_attention_2

logger:
  backend: swanlab
  project: "ig-grpo"
  description: "SFT warmup on retail domain (4×4090)"

output:
  dir: "experiments/sft_retail"
  merge_dir: "experiments/sft_lora_merged"  # 合并后的模型路径
