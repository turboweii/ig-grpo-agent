# IG-Combo 实验配置
# 添加工具组合奖励

defaults:
  - base: base

trainer:
  project: IG-GRPO
  experiment_name: ig_combo_retail

  # IG-GRPO 配置
  use_jig_reward: true
  jig_weight: 0.5
  jig_use_curriculum: false

  # 组件
  use_coverage_tracker: true
  use_sustained_exploration: false
  use_dependency_graph: true  # 启用工具依赖图

  # 权重调整
  alpha_state: 0.3
  alpha_tool: 0.4  # 提高工具组合权重
  alpha_transfer: 0.3  # 提高转移奖励

  # 重复惩罚
  repeat_penalty: 0.3
  repeat_window: 3

ig_grpo:
  use_jig_reward: true
  jig_weight: 0.5
  jig_use_curriculum: false

  alpha_state: 0.3
  alpha_tool: 0.4
  alpha_transfer: 0.3
  alpha_sustained: 0.0

  use_coverage_tracker: true
  use_sustained_exploration: false
  use_dependency_graph: true

  repeat_penalty: 0.3
  repeat_window: 3

logging:
  log_interval: 10
  save_interval: 50
  eval_interval: 50

output:
  output_dir: outputs/ig_combo/
