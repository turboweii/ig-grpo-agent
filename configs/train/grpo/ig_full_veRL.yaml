# IG-Full: 完整 IG-GRPO 方案
# JIG + 课程学习 + 探索持续性
hydra:
  searchpath:
    - pkg://verl/trainer/config

defaults:
  - ppo_trainer
  - _self_

data:
  train_files: experiments/vanilla/train.parquet
  val_files: experiments/vanilla/val.parquet
  train_batch_size: 4
  max_prompt_length: 8192
  max_response_length: 12288
  return_raw_chat: True
  tool_config_path: configs/tool_config/tau_bench_airline_tools.yaml

actor_rollout_ref:
  model:
    path: experiments/sft_lora_merged
    enable_gradient_checkpointing: true
    lora_rank: 16
    lora_alpha: 32
    use_fused_kernels: true
    override_config:
      attn_implementation: flash_attention_2
  actor:
    fsdp_config:
      optimizer_offload: true
      param_offload: true
      model_dtype: bf16
    optim:
      lr: 5.0e-6
    use_kl_loss: True
    kl_loss_coef: 0.01
    kl_loss_type: low_var_kl
    ppo_mini_batch_size: 4
    ppo_micro_batch_size_per_gpu: 2
  rollout:
    name: "vllm"
    mode: async
    agent:
      default_agent_loop: tool_agent
    multi_turn:
      enable: True
      format: "hermes"
      max_user_turns: 15
      max_assistant_turns: 15
      tool_config_path: configs/tool_config/tau_bench_airline_tools.yaml
      interaction_config_path: configs/interaction_config/tau_bench_airline_jig.yaml
    n: 8
    temperature: 0.7
    top_p: 0.9
    tensor_model_parallel_size: 1
    calculate_log_probs: true
    gpu_memory_utilization: 0.45
    free_cache_engine: true
    max_num_seqs: 10
    max_model_len: 24576
    max_num_batched_tokens: 24576
    log_prob_micro_batch_size_per_gpu: 2
    val_kwargs:
      n: 1
      temperature: 0.7
      top_p: 0.9
  ref:
    fsdp_config:
      optimizer_offload: true
      param_offload: true
      model_dtype: bf16
    model:
      path: experiments/sft_lora_merged
      override_config:
        attn_implementation: flash_attention_2
    log_prob_micro_batch_size_per_gpu: 2

algorithm:
  adv_estimator: grpo
  kl_ctrl:
    kl_coef: 0.01
  rollout_correction:
    bypass_mode: true

trainer:
  total_epochs: 50
  total_training_steps: 300
  save_freq: 50
  test_freq: 50
  default_local_dir: experiments/ig_full/checkpoints
  logger: ['console', 'swanlab']
  project_name: ig-grpo
  experiment_name: ig_full_300step
  n_gpus_per_node: 1
  nnodes: 1
